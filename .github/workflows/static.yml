name: Deploy Static Site

concurrency:
  group: webhook-deploy
  cancel-in-progress: true

on:
  repository_dispatch:
    types: [webhook_deploy]
  workflow_dispatch:
    inputs:
      clearCache:
        description: "Clear build cache before generating"
        required: false
        default: "false"
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clear cache
        if: ${{ github.event.inputs.clearCache == 'true' }}
        run: |
          echo "Clearing cache..."
          rm -rf cache*
          rm -rf www

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
          
      - name: Run Build Script
        run: node build.js
        env:
          WP_API_URL: ${{ secrets.WP_API_URL }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
             
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Automated build: add new pages"

          # Merge strategy místo rebase
          git pull --no-rebase origin main --strategy-option=ours || {
            git merge --abort
            exit 1
          }

          git push origin main
          
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./www

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4