name: Deploy Static Site

on:
  repository_dispatch:
    types: [webhook_deploy]
  workflow_dispatch:
    inputs:
      clearCache:
        description: "Clear build cache before generating"
        required: false
        default: "false"
  push:
    branches: [main]
    # Volitelné: omez push triggery jen na zdrojáky, ne na vygenerovaný obsah
    paths:
      - 'build.js'
      - 'src/**'
      - '.github/workflows/deploy.yml'
    paths-ignore:
      - 'www/**'

# --- Jen 1 run na větev + zruš starší běh při novém požadavku
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: write

    steps:
      # Debounce okno 120 s – starší běhy se při novém triggeru ukončí
      - name: Debounce window (120s)
        run: sleep 120

      - name: Checkout code
        uses: actions/checkout@v4

        # (Volitelné) pokud chceš z push triggeru ignorovat commity bota:
        # with:
        #   persist-credentials: false

      - name: Clear cache
        if: ${{ github.event.inputs.clearCache == 'true' }}
        run: |
          echo "Clearing cache..."
          rm -rf cache*
          rm -rf www

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Build Script
        run: node build.js
        env:
          WP_API_URL: ${{ secrets.WP_API_URL }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Automated build: add new pages"

          # Bez rebase, řeší konflikty ve prospěch lokálního buildu
          git pull --no-rebase origin main --strategy-option=ours || {
            git merge --abort
            exit 1
          }

          git push origin main

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./www

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4