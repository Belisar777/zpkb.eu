<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>
  <script>
    const short = (navigator.language || "en").toLowerCase().substring(0, 2);
    if (short === "en") location.href = "en/";
    if (short === "fr") location.href = "fr/";
    location.href = "cs/";
  </script>
</head>
<body>
  <noscript>
    <a href="en/">EN</a> <a href="fr/">FR</a> <a href="cs/">CS</a>
  </noscript>
</body>
</html>
