<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Redirecting…</title>
  <script>
    // Získání jazyka prohlížeče (např. "cs-CZ", "en-US")
    const lang = navigator.language || navigator.userLanguage;

    // Normalizace na dvoupísmenný kód
    const short = lang.toLowerCase().substring(0, 2);

    // Přesměrování podle jazyka
    if (short === "cs") {
      window.location.href = "cs/";
    } else {
      window.location.href = "en/";
    }
  </script>
</head>

<body>
</body>

</html>
